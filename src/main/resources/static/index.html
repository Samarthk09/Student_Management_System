<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Student Management System</title>
    <!-- Bootstrap -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
    />
</head>
<body>
<div id="navbar"></div>

<!-- Hero Section -->
<div class="container mt-5">
    <div class="card shadow-lg border-0 text-center p-5">
        <h1 class="mb-3">Student Management System</h1>
        <p class="text-muted">
            Manage student records easily with add, update, search and delete
            features.
        </p>
    </div>
</div>
<script>
    fetch("navbar.html")
        .then(res => res.text())
        .then(data => {
            document.getElementById("navbar").innerHTML = data;

            fetch("/current-user")
                .then(response => response.text())
                .then(user => {
                    document.getElementById("username").innerText = user;
                });
        });
</script>
</body>
</html>

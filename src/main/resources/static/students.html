<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Student Management</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="students.html">View Students</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="add-student.html">Add Student</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h2>Students List</h2>
    <div style="margin-bottom:20px;">
        <input type="text" id="searchInput" placeholder="Search student by name" onkeyup="searchStudents()">
    </div>
    <table class="table table-bordered">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Course</th>
            <th>Fee</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>
</div>
<script>
    async function searchStudents(){
    const name = document.getElementById("searchInput").value;
    const response = await fetch(`/students/search?name=${name}`);
    const students = await response.json();
    const tableBody = document.getElementById("studentTable");
    tableBody.innerHTML = "";
    students.forEach(student => {
        const row = `
            <tr>
                <td>${student.studentId}</td>
                <td>${student.studentName}</td>
                <td>${student.studentEmail}</td>
                <td>${student.studentCourse}</td>
                <td>${student.studentFees}</td>
                <td>
                    <button onclick="editStudent(${student.studentId})">Edit</button>
                    <button onclick="deleteStudent(${student.studentId})">Delete</button>
                </td>
            </tr>
        `;
        tableBody.innerHTML += row;
    });
}
    fetch("http://localhost:8080/students")
    .then(response => response.json())
    .then(data => {
        let table = document.getElementById("studentTable");
        table.innerHTML = "";
        data.forEach(student => {
            let row = `
            <tr>
                <td>${student.studentId}</td>
                <td>${student.studentName}</td>
                <td>${student.studentEmail}</td>
                <td>${student.studentCourse}</td>
                <td>${student.studentFees}</td>

                <td>
                    <button class="btn btn-warning btn-sm"
                    onclick="window.location.href='update-student.html?id=${student.studentId}'">
                    Edit
                    </button>

                    <button class="btn btn-danger btn-sm"
                    onclick="deleteStudent(${student.studentId})">
                    Delete
                    </button>
                </td>
            </tr>
            `;
            table.innerHTML += row;
        });
    })
    function deleteStudent(id){
        if(confirm("Are you sure you want to delete this student?")){
            fetch("http://localhost:8080/students/" + id + "/soft-delete",{
                method:"PUT"
            })
            .then(()=>{
            alert("Student Deleted Successfully...");
                location.reload();
            });
        }
    }
</script>
</body>
</html>

<!doctype html>
<html>
<head>
    <title>Update Student</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
    />
</head>
<body>
<div id="navbar"></div>
<div class="container mt-5" style="max-width: 600px">
    <h2 class="mb-4 text-center">Update Student</h2>
    <form id="updateForm">
        <input id="id" type="hidden"/>
        <input class="form-control mb-3" id="name" placeholder="Student Name"/>
        <input
                class="form-control mb-3"
                id="email"
                placeholder="Email Address"
        />
        <input class="form-control mb-3" id="course" placeholder="Course"/>
        <input class="form-control mb-3" id="fee" placeholder="Fees"/>
        <button
                class="btn btn-warning w-100 mt-2"
                type="button"
                onclick="updateStudent()"
        >
            Update Student
        </button>
    </form>
    <span id="msg"></span>
</div>
<script>
    fetch("navbar.html")
        .then(res => res.text())
        .then(data => {
            document.getElementById("navbar").innerHTML = data;

            fetch("/current-user")
                .then(response => response.text())
                .then(user => {
                    document.getElementById("username").innerText = user;
                });
        });
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");
      document.getElementById("id").value = id;
      window.onload = function () {
        fetch("http://localhost:8080/students/" + id)
          .then((res) => res.json())
          .then((student) => {
            document.getElementById("name").value = student.studentName;
            document.getElementById("email").value = student.studentEmail;
            document.getElementById("course").value = student.studentCourse;
            document.getElementById("fee").value = student.studentFees;
          })
          .catch((err) => {
            console.log(err);
            alert("Error loading student data");
          });
      };
      function updateStudent() {
        let id = document.getElementById("id").value;
        fetch("http://localhost:8080/students/" + id, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            studentName: document.getElementById("name").value,
            studentEmail: document.getElementById("email").value,
            studentCourse: document.getElementById("course").value,
            studentFees: document.getElementById("fee").value,
          }),
        })
          .then(() => {
            alert("Student Updated Successfully....");
            window.location.href = "students.html";
          })
          .catch((err) => {
            console.log(err);
            alert("Update failed...");
          });
      }
</script>
</body>
</html>
